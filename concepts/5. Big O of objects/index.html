  <body style="font-family: cursive">
    <h1>Big O of Objects</h1>
    <ol>
        <li>1. Insertion -   O(1)</li>
        <li>2. Removal -   O(1)</li>
        <li>3. Searching -   O(N)</li>
        <li>4. Access -   O(1)</li>
    </ol>

    <ol>
        <li>Object.keys -   O(N) </li>
        <li>Object.values -   O(N) </li>
        <li>Object.entries -   O(N) </li>
        <li>hasOwnProperty -   O(1) </li>
    </ol>
  </body>
